services:
   server:
      build:
         context: ./server
         dockerfile: Dockerfile
      ports:
         - "5000:5000"
      develop:
         watch:
            - action: sync
              path: ./server
              target: /app
              ignore:
                 - node_modules/
      environment:
         - MONGO_URI=mongodb://db:27017/wbca
         - REDIS_URL=redis://redis:6379
         - PORT=5000
      depends_on:
         - db
         - redis
   db:
      image: mongo:8.2.5
      ports:
         - "27017:27017"
      volumes:
         - mongo-data:/data/db
   redis:
      image: redis:7-alpine
      ports:
         - "6379:6379"
      volumes:
         - redis-data:/data
      restart: always
volumes:
   mongo-data:
   redis-data:
